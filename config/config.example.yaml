# homelab-helper configuration example
# Copy this file to config.yaml and edit to match your environment.
# Or delete config.yaml entirely to trigger the first-run setup wizard.

homelab:
  name: "My Homelab"

traefik:
  network: "reverse-proxy"
  cert_resolver: "letsencrypt"
  entrypoint: "websecure"
  # Name of your forward-auth middleware (e.g. "tinyauth@file", "authelia@docker").
  # Omit or set to "" to hide the auth checkbox in the UI.
  auth_middleware: ""

# List of domains you own. The first entry is the default in the form.
domains:
  - example.com

autokuma:
  # Set to true if AutoKuma is running on your host.
  # AutoKuma reads kuma.* labels from containers and creates Uptime Kuma monitors automatically.
  enabled: false

homepage:
  # Set to true if you use the Homepage dashboard.
  enabled: false
  groups:
    - Infrastructure
    - Monitoring
    - Media
    - Utilities

sandbox:
  # Default TTL shown in the sandbox create form (hours)
  default_ttl_hours: 4
  # Hard limit on concurrent sandboxes
  max_sandboxes: 10
  # TTL options shown in the dropdown (hours)
  ttl_options: [1, 4, 8, 24]

security:
  # Set to true once you have confirmed this service is protected
  # by your reverse proxy with authentication. Hides the auth warning banner.
  suppress_auth_warning: false
