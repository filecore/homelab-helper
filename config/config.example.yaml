# homelab-helper configuration example
# Copy this file to config.yaml and edit to match your environment.
# Or delete config.yaml entirely to trigger the first-run setup wizard.

homelab:
  name: "My Homelab"

traefik:
  network: "reverse-proxy"
  cert_resolver: "letsencrypt"
  entrypoint: "websecure"
  # Name of your forward-auth middleware (e.g. "tinyauth@file", "authelia@docker").
  # Omit or set to "" to hide the auth checkbox in the UI.
  auth_middleware: ""

# List of domains you own. The first entry is the default in the form.
domains:
  - example.com

autokuma:
  # Set to true if AutoKuma is running on your host.
  # AutoKuma reads kuma.* labels from containers and creates Uptime Kuma monitors automatically.
  enabled: false

homepage:
  # Set to true if you use the Homepage dashboard.
  enabled: false
  groups:
    - Infrastructure
    - Monitoring
    - Media
    - Utilities

sandbox:
  # Set to false to disable the sandbox tab entirely.
  enabled: true

  # Dedicated Docker network for sandbox containers (created automatically).
  # Keep this different from your production reverse-proxy network so that
  # sandbox containers cannot reach other homelab services.
  network: "sandbox-net"

  # Drop all Linux capabilities from sandbox containers. Recommended.
  cap_drop_all: true

  # Prevent privilege escalation via setuid binaries. Recommended.
  no_new_privileges: true

  # Per-container memory cap (e.g. "512m", "1g"). Leave blank for no limit.
  # WARNING: no limit means a runaway container can exhaust host memory.
  memory_limit: "512m"

  # Per-container CPU cap in cores (e.g. 1.0). Set to 0 for no limit.
  # WARNING: no limit means a runaway container can exhaust host CPU.
  cpu_limit: 1.0

  # Default TTL shown in the sandbox create form (hours)
  default_ttl_hours: 4
  # Hard limit on concurrent sandboxes
  max_sandboxes: 10
  # TTL options shown in the dropdown (hours)
  ttl_options: [1, 4, 8, 24]

security:
  # Set to true once you have confirmed this service is protected
  # by your reverse proxy with authentication. Hides the auth warning banner.
  suppress_auth_warning: false
