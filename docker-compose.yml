services:
  homelab-helper:
    build: .
    container_name: homelab-helper
    restart: unless-stopped
    volumes:
      - ./config:/config
    environment:
      - CONFIG_PATH=/config/config.yaml
    ports:
      - "7842:7842"
    networks:
      - reverse-proxy

  # To expose via Traefik, uncomment and add labels -- or better yet, use the wizard
  # itself to generate the snippet for homelab-helper, then add the labels here.

networks:
  reverse-proxy:
    external: true
