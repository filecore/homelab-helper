services:
  homelab-helper:
    build: .
    container_name: homelab-helper
    restart: unless-stopped
    volumes:
      - ./config:/config
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONFIG_PATH=/config/config.yaml
      - STATE_FILE=/data/sandboxes.json
    ports:
      - "7842:7842"
    networks:
      - reverse-proxy

  # To expose via Traefik, add labels here or use the New Service wizard
  # to generate the compose snippet for homelab-helper itself.

networks:
  reverse-proxy:
    external: true
